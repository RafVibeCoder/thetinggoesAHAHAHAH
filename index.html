<!DOCTYPE html>

    html, body {

      left: 50%;
      transform: translateX(-50%);

      left: 10px;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playFootstep(volume) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.value = 80 + Math.random() * 40;
  gain.gain.value = volume;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}
function playKnock(volume) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "square";
  osc.frequency.value = 120;
  gain.gain.value = volume;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}
function playJumpscare() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sawtooth";
  osc.frequency.value = 220;
  gain.gain.value = 0.4;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
}

function lumpyCylinder(rt, rb, h, seg, ns, na) {
  const geo = new THREE.CylinderGeometry(rt, rb, h, seg, 12);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i),
      y = pos.getY(i),
      z = pos.getZ(i);
    const n =
      Math.sin(x * ns) * Math.cos(z * ns) * Math.sin(y * ns) * na;
    pos.setXYZ(i, x + n, y + n * 0.5, z + n);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}
