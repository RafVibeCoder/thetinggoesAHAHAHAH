<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Boiled One – Level 3 Realism</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-size: 18px;
    }

    #message {
      position: absolute;
      top: 50px;
      left: 10px;
      z-index: 10;
      font-size: 20px;
      color: #ff4444;
    }

    #prepTimer {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      font-size: 18px;
    }

    #hideTimer {
      position: absolute;
      top: 80px;
      left: 10px;
      z-index: 10;
      font-size: 18px;
      color: #cccccc;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

  <div id="ui">
    Sound: <span id="soundMeter">0.00</span>
  </div>

  <div id="message"></div>
  <div id="prepTimer">Boiled One arrives in: 60.0</div>
  <div id="hideTimer"></div>

  <canvas id="game"></canvas>

  <script type="module">
    import { startEngine } from "./js/engine.js";

    startEngine({
      canvas: document.getElementById("game"),
      ui: {
        soundMeter: document.getElementById("soundMeter"),
        prepTimer: document.getElementById("prepTimer"),
        message: document.getElementById("message"),
        hideTimer: document.getElementById("hideTimer")
      }
    });
  </script>

</body>
</html>
